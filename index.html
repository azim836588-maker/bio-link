<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Business Card</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            transition: background-image 0.5s ease;
        }

        /* ===== LOADER ===== */
        #loader-wrapper {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1000;
            display: flex;
            justify-content: center;
            align-items: center;
            pointer-events: none;
        }

        .door {
            position: absolute;
            top: 0;
            width: 50%;
            height: 100%;
            background-color: #1a1a1a;
            transition: transform 0.75s cubic-bezier(0.77, 0, 0.175, 1);
            z-index: 1001;
        }

        .door-left  { left: 0;  border-right: 1px solid #333; }
        .door-right { right: 0; border-left:  1px solid #333; }

        .welcome-text {
            position: absolute;
            z-index: 1002;
            color: #fff;
            font-size: 32px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 5px;
            transition: opacity 0.4s ease;
            text-align: center;
            pointer-events: none;
        }

        .welcome-text span {
            display: block;
            font-size: 12px;
            font-weight: normal;
            letter-spacing: 2px;
            margin-top: 10px;
            color: #aaa;
        }

        /* Animated dots */
        .dots-anim::after {
            content: '';
            display: inline-block;
            animation: dots 1.5s steps(4, end) infinite;
        }
        @keyframes dots {
            0%   { content: ''; }
            25%  { content: '.'; }
            50%  { content: '..'; }
            75%  { content: '...'; }
            100% { content: ''; }
        }

        /* Opened state */
        .loaded .door-left  { transform: translateX(-100%); }
        .loaded .door-right { transform: translateX(100%);  }
        .loaded .welcome-text { opacity: 0; }
        .loaded#loader-wrapper {
            visibility: hidden;
            transition: visibility 0s 0.75s;
        }

        /* ===== CARD ===== */
        .card {
            width: 100%;
            max-width: 400px;
            background-color: #e3e9ff;
            min-height: 100vh;
            position: relative;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
            scrollbar-width: none;
            padding-bottom: 60px;
        }
        .card::-webkit-scrollbar { display: none; }

        /* ===== BANNER ===== */
        .banner {
            width: 100%;
            min-height: 180px;
            background-size: cover;
            background-position: center;
            position: relative;
            overflow: hidden;
            flex-shrink: 0;
            background-color: #ddd;
            transition: background-image 0.4s ease;
        }

        /* Skeleton shimmer on banner while image loads */
        .banner.loading {
            background: linear-gradient(90deg, #d0d0d0 25%, #e8e8e8 50%, #d0d0d0 75%);
            background-size: 200% 100%;
            animation: shimmer 1.2s infinite;
        }
        @keyframes shimmer {
            0%   { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        .banner::after {
            content: "";
            position: absolute;
            top: 0;
            left: -150%;
            width: 50%;
            height: 100%;
            background: linear-gradient(to right,
                rgba(255,255,255,0) 0%,
                rgba(255,255,255,0.4) 50%,
                rgba(255,255,255,0) 100%);
            transform: skewX(-25deg);
            animation: shine-banner 10s infinite;
            pointer-events: none;
        }
        @keyframes shine-banner {
            0%   { left: -150%; }
            20%  { left: 150%; }
            100% { left: 150%; }
        }

        /* ===== PROFILE PIC ===== */
        .profile-container {
            margin-top: -60px;
            z-index: 5;
        }

        .profile-pic {
            width: 120px;
            height: 120px;
            background-color: #fff;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 5px solid #e3e9ff;
            overflow: hidden;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            position: relative;
        }

        /* Skeleton shimmer on profile pic */
        .profile-pic.loading {
            background: linear-gradient(90deg, #d0d0d0 25%, #e8e8e8 50%, #d0d0d0 75%);
            background-size: 200% 100%;
            animation: shimmer 1.2s infinite;
        }

        .profile-pic img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0;
            transition: opacity 0.4s ease;
        }
        .profile-pic img.visible { opacity: 1; }

        /* ===== INFO ===== */
        .info {
            text-align: center;
            padding: 15px;
            width: 100%;
        }

        .name {
            font-size: 24px;
            font-weight: 700;
            color: #333;
            margin-bottom: 5px;
        }

        .description {
            font-size: 13px;
            color: #555;
            line-height: 1.4;
            max-width: 300px;
            margin: 0 auto;
        }

        /* ===== SAVE BUTTON ===== */
        .save-btn {
            background-color: #0056ff;
            color: white;
            padding: 12px 0;
            border-radius: 40px;
            text-decoration: none;
            font-weight: bold;
            font-size: 16px;
            margin: 10px 0 20px;
            width: 85%;
            text-align: center;
            box-shadow: 0 4px 12px rgba(0, 86, 255, 0.3);
            display: block;
        }

        /* ===== ICON GRID ===== */
        .icon-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            width: 90%;
            padding-bottom: 20px;
        }

        .icon-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
        }

        .icon-box {
            width: 60px;
            height: 60px;
            border-radius: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 26px;
            margin-bottom: 6px;
        }

        .icon-label {
            font-size: 11px;
            color: #444;
            font-weight: 600;
        }

        .fb-bg   { background-color: #1877F2; }
        .ig-bg   { background: radial-gradient(circle at 30% 107%, #fdf497 0%, #fdf497 5%, #fd5949 45%, #d6249f 60%, #285AEB 90%); }
        .tk-bg   { background-color: #000000; }
        .yt-bg   { background-color: #FF0000; }
        .wa-bg   { background-color: #25D366; }
        .ms-bg   { background-color: #0084FF; }
        .tg-bg   { background-color: #26A5E4; }
        .x-bg    { background-color: #000000; }
        .li-bg   { background-color: #0077B5; }
        .mail-bg { background-color: #EA4335; }

        .extra-space { height: 40px; width: 100%; }
    </style>
</head>
<body>

    <div id="loader-wrapper">
        <div class="door door-left"></div>
        <div class="welcome-text">
            WELCOME
            <span id="load-msg" class="dots-anim">Loading Data</span>
        </div>
        <div class="door door-right"></div>
    </div>

    <div class="card" id="businessCard">
        <div class="banner loading" id="bannerImage"></div>

        <div class="profile-container">
            <div class="profile-pic loading" id="profilePic"></div>
        </div>

        <div class="info">
            <div class="name" id="displayName">...</div>
            <div class="description" id="displayBio">...</div>
        </div>

        <a href="#" class="save-btn" id="saveBtn">Save Contact</a>

        <div class="icon-grid" id="iconGrid"></div>

        <div class="extra-space"></div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

    <script>
        const SOCIAL_LINKS = [
            { id: 'fb-p',    label: 'FB Profile', icon: 'fa-brands fa-facebook-f',         bgClass: 'fb-bg'   },
            { id: 'fb-page', label: 'FB Page',     icon: 'fa-solid fa-flag',                bgClass: 'fb-bg'   },
            { id: 'ig',      label: 'Instagram',   icon: 'fa-brands fa-instagram',          bgClass: 'ig-bg'   },
            { id: 'tt',      label: 'TikTok',      icon: 'fa-brands fa-tiktok',             bgClass: 'tk-bg'   },
            { id: 'yt',      label: 'YouTube',     icon: 'fa-brands fa-youtube',            bgClass: 'yt-bg'   },
            { id: 'wa',      label: 'WhatsApp',    icon: 'fa-brands fa-whatsapp',           bgClass: 'wa-bg'   },
            { id: 'msn',     label: 'Messenger',   icon: 'fa-brands fa-facebook-messenger', bgClass: 'ms-bg'   },
            { id: 'tg',      label: 'Telegram',    icon: 'fa-brands fa-telegram',           bgClass: 'tg-bg'   },
            { id: 'x',       label: 'X',           icon: 'fa-solid fa-x',                   bgClass: 'x-bg'    },
            { id: 'li',      label: 'LinkedIn',    icon: 'fa-brands fa-linkedin-in',        bgClass: 'li-bg'   },
            { id: 'mail',    label: 'Email',       icon: 'fa-regular fa-envelope',          bgClass: 'mail-bg' }
        ];

        const firebaseConfig = {
            apiKey: "AIzaSyA2VRs8vok_FuwOkhA0vFJA3NU8Rq-te2M",
            authDomain: "pro2-270e8.firebaseapp.com",
            projectId: "pro2-270e8",
            storageBucket: "pro2-270e8.firebasestorage.app",
            messagingSenderId: "497934747508",
            appId: "1:497934747508:web:d689174366df6236fa8e21",
            measurementId: "G-ZMC62EF10E"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        auth.signInAnonymously().catch(e => console.error("Auth error:", e));

        let profileDone = false;
        let linksDone   = false;
        let isOpened    = false;

        /* ── দরজা খোলার ফাংশন ─────────────────────────────────────
           ছবির জন্য অপেক্ষা নেই — টেক্সট ও লিংক ডেটা রেডি হলেই খুলবে */
        function openDoors() {
            if (profileDone && linksDone && !isOpened) {
                isOpened = true;

                // "Ready!" দেখাও
                const msg = document.getElementById('load-msg');
                msg.classList.remove('dots-anim');
                msg.textContent = 'Ready!';

                // সাথে সাথে দরজা খোলো (কোনো setTimeout নেই)
                document.getElementById('loader-wrapper').classList.add('loaded');
            }
        }

        /* ── ছবি ফেড-ইন লোডার ─────────────────────────────────────
           দরজা খোলার পর ব্যাকগ্রাউন্ডে ছবি লোড হয়,
           লোড হলে shimmer সরে যায় এবং ছবি ফেড-ইন করে দেখায় */
        function loadBannerImage(url) {
            if (!url) return;
            const banner = document.getElementById('bannerImage');
            const img = new Image();
            img.src = url;
            img.onload = () => {
                banner.style.backgroundImage = `url('${url}')`;
                banner.classList.remove('loading');
            };
        }

        function loadProfileImage(url) {
            if (!url) return;
            const picEl = document.getElementById('profilePic');
            const img = new Image();
            img.src = url;
            img.onload = () => {
                picEl.classList.remove('loading');
                img.className = 'visible';
                picEl.innerHTML = '';
                picEl.appendChild(img);
            };
        }

        function loadBgImage(url) {
            if (!url) return;
            const img = new Image();
            img.src = url;
            img.onload = () => {
                document.body.style.backgroundImage = `url('${url}')`;
            };
        }

        /* ── URL নির্মাণ ──────────────────────────────────────────── */
        function buildHref(link, val) {
            if (!val || val === '#') return '#';

            if (link.id === 'wa') {
                if (val.startsWith('http')) return val;
                return `https://wa.me/${val.replace(/[^0-9]/g, '')}`;
            }
            if (link.id === 'tg') {
                if (val.startsWith('http')) return val;
                if (val.startsWith('+') || /^\d/.test(val))
                    return `https://t.me/${val.replace(/[^0-9+]/g, '')}`;
                return `https://t.me/${val.replace('@', '')}`;
            }
            if (link.id === 'tt') {
                if (val.startsWith('http')) return val;
                return `https://www.tiktok.com/@${val.replace('@', '')}`;
            }
            if (link.id === 'mail') {
                if (val.startsWith('mailto:') || val.startsWith('http')) return val;
                return `mailto:${val}`;
            }
            return val.startsWith('http') ? val : '#';
        }

        /* ── Analytics ────────────────────────────────────────────── */
        function recordClick(label, type) {
            const device = /Mobi|Android/i.test(navigator.userAgent) ? 'Mobile' : 'Desktop';
            const clickData = { label, type, device, time: Date.now() };
            db.collection('card_data').doc('analytics').get().then(doc => {
                const existing = (doc.exists && doc.data().clicks) ? doc.data().clicks : [];
                existing.push(clickData);
                db.collection('card_data').doc('analytics').set({ clicks: existing });
            }).catch(e => console.error("Analytics error:", e));
        }

        /* ── Firebase Realtime Listeners ──────────────────────────── */
        function listenToCardData() {

            // ─── Profile ───────────────────────────────────────────
            db.collection('card_data').doc('profile').onSnapshot(doc => {
                if (!doc.exists) return;
                const data = doc.data();

                // টেক্সট ও UI আপডেট — কোনো await নেই
                document.getElementById('displayName').textContent = data.name || 'Your Name';
                document.getElementById('displayBio').textContent  = data.bio  || '';

                const saveBtn = document.getElementById('saveBtn');
                saveBtn.textContent = data.save_text || 'Save Contact';
                if (data.phone) {
                    saveBtn.href = `tel:${data.phone.replace(/\s/g, '')}`;
                }
                saveBtn.onclick = () => recordClick('Save Contact', 'save_btn');

                // ✅ টেক্সট রেডি → profileDone সেট → দরজা চেক
                profileDone = true;
                openDoors();

                // ছবি ব্যাকগ্রাউন্ডে লোড হবে (দরজার সাথে সম্পর্ক নেই)
                loadProfileImage(data.profile_img);
                loadBannerImage(data.banner_img);
                loadBgImage(data.bg);
            });

            // ─── Links ─────────────────────────────────────────────
            db.collection('card_data').doc('links').onSnapshot(doc => {
                const linksData = doc.exists ? doc.data() : {};
                const grid = document.getElementById('iconGrid');
                grid.innerHTML = '';

                SOCIAL_LINKS.forEach(link => {
                    const val = linksData[`link_${link.id}_url`]
                             || linksData[`link_${link.id}_user`]
                             || linksData[`link_${link.id}`];
                    const status = linksData[`status_${link.id}`];

                    if (status === true && val && val !== '#') {
                        const item = document.createElement('a');
                        item.className = 'icon-item';
                        item.href      = buildHref(link, val);
                        item.target    = '_blank';
                        item.innerHTML = `
                            <div class="icon-box ${link.bgClass}">
                                <i class="${link.icon}"></i>
                            </div>
                            <div class="icon-label">${link.label}</div>`;
                        item.addEventListener('click', () =>
                            recordClick(link.label, 'social_link'));
                        grid.appendChild(item);
                    }
                });

                // ✅ লিংক রেডি → linksDone সেট → দরজা চেক
                linksDone = true;
                openDoors();
            });
        }

        window.addEventListener('load', listenToCardData);
    </script>
</body>
</html>
